name: Add Cron Job

on:
  workflow_dispatch:
    inputs:
      server_ip:
        description: 'Server IP address'
        required: true
        type: string
      cron_schedule:
        description: 'Cron schedule (e.g., * * * * *)'
        required: true
        type: string
      command:
        description: 'Command to run (e.g., php /var/www/html/cron.php)'
        required: true
        type: string
      container_name:
        description: 'Container name (default: php-apache)'
        required: false
        default: 'php-apache'
        type: string

jobs:
  add-cron:
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DO_SSH_PRIVATE_KEY }}" > ~/.ssh/admin
          chmod 600 ~/.ssh/admin

      - name: Validate inputs
        run: |
          if [[ ! "${{ github.event.inputs.cron_schedule }}" =~ ^[0-9*/,\- ]+$ ]]; then
            echo "Error: Invalid cron schedule format"
            exit 1
          fi
          if [[ ! "${{ github.event.inputs.server_ip }}" =~ ^[0-9.]+$ ]]; then
            echo "Error: Invalid IP address"
            exit 1
          fi

      - name: Add cron job to container
        env:
          CRON_SCHEDULE: ${{ github.event.inputs.cron_schedule }}
          CRON_COMMAND: ${{ github.event.inputs.command }}
          CONTAINER: ${{ github.event.inputs.container_name }}
          SERVER_IP: ${{ github.event.inputs.server_ip }}
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/admin root@"$SERVER_IP" \
            "docker exec $CONTAINER sh -c 'echo \"$CRON_SCHEDULE $CRON_COMMAND\" | crontab -'"

      - name: Verify cron job
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/admin root@${{ github.event.inputs.server_ip }} \
            "docker exec ${{ github.event.inputs.container_name }} crontab -l"

      - name: Summary
        run: |
          echo "## Cron Job Added" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Server:** \`${{ github.event.inputs.server_ip }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Container:** \`${{ github.event.inputs.container_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Schedule:** \`${{ github.event.inputs.cron_schedule }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Command:** \`${{ github.event.inputs.command }}\`" >> $GITHUB_STEP_SUMMARY
