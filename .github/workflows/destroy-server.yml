name: Destroy Server

on:
  workflow_dispatch:
    inputs:
      server_ip:
        description: 'Server IP address to destroy'
        required: true
        type: string
      confirm:
        description: 'Type "DESTROY" to confirm'
        required: true
        type: string

jobs:
  destroy:
    runs-on: ubuntu-latest

    steps:
      - name: Validate confirmation
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "DESTROY" ]; then
            echo "Error: You must type DESTROY to confirm"
            exit 1
          fi

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.0

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Destroy via DO API
        run: |
          DROPLET_ID=$(curl -s -X GET \
            -H "Authorization: Bearer ${{ secrets.DO_TOKEN }}" \
            "https://api.digitalocean.com/v2/droplets" | \
            jq -r --arg ip "${{ github.event.inputs.server_ip }}" '.droplets[] | select(.networks.v4[]? | .ip_address == $ip and .type == "public") | .id')

          if [ -z "$DROPLET_ID" ]; then
            echo "Droplet with IP ${{ github.event.inputs.server_ip }} not found"
            exit 1
          fi

          echo "Destroying droplet $DROPLET_ID"

          curl -X DELETE \
            -H "Authorization: Bearer ${{ secrets.DO_TOKEN }}" \
            "https://api.digitalocean.com/v2/droplets/$DROPLET_ID"

      - name: Summary
        run: |
          echo "## Server Destroyed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Server IP:** \`${{ github.event.inputs.server_ip }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Droplet has been deleted from DigitalOcean" >> $GITHUB_STEP_SUMMARY
