name: Destroy Server

run-name: ${{ github.event.inputs.domain }}

on:
  workflow_dispatch:
    inputs:
      domain:
        description: 'Domain name of the server to destroy'
        required: true
        type: string
      confirm:
        description: 'Type "DESTROY" to confirm'
        required: true
        type: string

jobs:
  destroy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate confirmation
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "DESTROY" ]; then
            echo "Error: You must type DESTROY to confirm"
            exit 1
          fi

      - name: Find droplet by name
        id: find
        run: |
          DROPLET_ID=$(curl -s -X GET \
            -H "Authorization: Bearer ${{ secrets.DO_TOKEN }}" \
            "https://api.digitalocean.com/v2/droplets?name=${{ github.event.inputs.domain }}" | \
            jq -r '.droplets[] | select(.name == "${{ github.event.inputs.domain }}") | .id')

          if [ -z "$DROPLET_ID" ]; then
            echo "Error: Droplet '${{ github.event.inputs.domain }}' not found"
            exit 1
          fi

          echo "droplet_id=$DROPLET_ID" >> $GITHUB_OUTPUT
          echo "Found droplet: $DROPLET_ID"

      - name: Delete droplet
        run: |
          curl -s -X DELETE \
            -H "Authorization: Bearer ${{ secrets.DO_TOKEN }}" \
            "https://api.digitalocean.com/v2/droplets/${{ steps.find.outputs.droplet_id }}"

          echo "Droplet ${{ steps.find.outputs.droplet_id }} deleted"

      - name: Delete Cloudflare DNS records
        run: |
          DOMAIN="${{ github.event.inputs.domain }}"
          API_TOKEN="${{ secrets.CLOUDFLARE_API_TOKEN }}"

          # Find zone
          find_zone() {
            local domain=$1
            # Try exact match
            local resp=$(curl -s "https://api.cloudflare.com/client/v4/zones?name=$domain" -H "Authorization: Bearer $API_TOKEN")
            local zone_id=$(echo "$resp" | jq -r '.result[0].id')
            if [ "$zone_id" != "null" ] && [ -n "$zone_id" ]; then
              echo "$zone_id $domain"
              return 0
            fi
            # Try parent domains
            local parts=(${domain//./ })
            for ((i=1; i<${#parts[@]}; i++)); do
              local parent=$(IFS=. ; echo "${parts[*]:$i}")
              resp=$(curl -s "https://api.cloudflare.com/client/v4/zones?name=$parent" -H "Authorization: Bearer $API_TOKEN")
              zone_id=$(echo "$resp" | jq -r '.result[0].id')
              if [ "$zone_id" != "null" ] && [ -n "$zone_id" ]; then
                echo "$zone_id $parent"
                return 0
              fi
            done
            return 1
          }

          ZONE_INFO=$(find_zone "$DOMAIN") || true
          ZONE_ID=$(echo "$ZONE_INFO" | awk '{print $1}')
          ZONE_NAME=$(echo "$ZONE_INFO" | awk '{print $2}')

          if [ -z "$ZONE_ID" ]; then
            echo "Zone not found for $DOMAIN, skipping DNS cleanup"
            exit 0
          fi

          echo "Found zone: $ZONE_NAME (ID: $ZONE_ID)"

          # Determine record name relative to zone
          if [ "$DOMAIN" == "$ZONE_NAME" ]; then
            RECORD_NAME="$DOMAIN"
            WWW_NAME="www.$DOMAIN"
          else
            RECORD_NAME="$DOMAIN"
            WWW_NAME="www.$RECORD_NAME"
          fi

          # Delete matching A records
          for NAME in "$RECORD_NAME" "$WWW_NAME"; do
            RECORDS=$(curl -s "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records?type=A&name=$NAME" -H "Authorization: Bearer $API_TOKEN")
            echo "$RECORDS" | jq -r '.result[].id' | while read -r RECORD_ID; do
              if [ -n "$RECORD_ID" ] && [ "$RECORD_ID" != "null" ]; then
                DELETE_RESP=$(curl -s -X DELETE "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records/$RECORD_ID" -H "Authorization: Bearer $API_TOKEN")
                SUCCESS=$(echo "$DELETE_RESP" | jq -r '.success')
                if [ "$SUCCESS" = "true" ]; then
                  echo "Deleted A record: $NAME (ID: $RECORD_ID)"
                else
                  echo "Failed to delete A record: $NAME (ID: $RECORD_ID)"
                  echo "Response: $DELETE_RESP"
                fi
              fi
            done
          done

      - name: Summary
        run: |
          echo "## Server Destroyed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Domain:** \`${{ github.event.inputs.domain }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Droplet ID:** \`${{ steps.find.outputs.droplet_id }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Droplet has been deleted via DO API" >> $GITHUB_STEP_SUMMARY
