name: Destroy Server

run-name: ${{ github.event.inputs.domain }}

on:
  workflow_dispatch:
    inputs:
      domain:
        description: 'Domain name of the server to destroy'
        required: true
        type: string
      confirm:
        description: 'Type "DESTROY" to confirm'
        required: true
        type: string

jobs:
  destroy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate confirmation
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "DESTROY" ]; then
            echo "Error: You must type DESTROY to confirm"
            exit 1
          fi

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform Init
        working-directory: terraform
        run: terraform init -lock=false

      - name: Terraform Destroy
        working-directory: terraform
        env:
          TF_VAR_do_token: ${{ secrets.DO_TOKEN }}
          TF_VAR_domain: ${{ github.event.inputs.domain }}
          TF_VAR_ssh_key_fingerprint: ${{ secrets.DO_SSH_KEY_FINGERPRINT }}
          TF_VAR_ssh_private_key_path: "/tmp/ssh_key"
        run: |
          echo "${{ secrets.DO_SSH_PRIVATE_KEY }}" > /tmp/ssh_key
          chmod 600 /tmp/ssh_key
          terraform destroy -auto-approve -lock=false \
            -var="do_token=${{ secrets.DO_TOKEN }}" \
            -var="domain=${{ github.event.inputs.domain }}" \
            -var="ssh_key_fingerprint=${{ secrets.DO_SSH_KEY_FINGERPRINT }}" \
            -var="ssh_private_key_path=/tmp/ssh_key"

      - name: Summary
        run: |
          echo "## Server Destroyed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Domain:** \`${{ github.event.inputs.domain }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Droplet has been deleted via Terraform" >> $GITHUB_STEP_SUMMARY
