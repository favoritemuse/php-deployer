name: Create Server

on:
  workflow_dispatch:
    inputs:
      domain:
        description: 'Domain or subdomain (e.g., example.com or test.example.com)'
        required: true
        type: string
      enable_mail:
        description: 'Create mail domain and accounts'
        required: false
        type: boolean
        default: true

jobs:
  create:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.0

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Apply
        working-directory: terraform
        env:
          TF_VAR_do_token: ${{ secrets.DO_TOKEN }}
          TF_VAR_domain: ${{ github.event.inputs.domain }}
          TF_VAR_region: "ams3"
          TF_VAR_size: "s-1vcpu-1gb"
          TF_VAR_ssh_key_fingerprint: ${{ secrets.DO_SSH_KEY_FINGERPRINT }}
          TF_VAR_ssh_private_key_path: "/tmp/ssh_key"
        run: |
          echo "${{ secrets.DO_SSH_PRIVATE_KEY }}" > /tmp/ssh_key
          chmod 600 /tmp/ssh_key
          terraform apply -auto-approve \
            -var="do_token=${{ secrets.DO_TOKEN }}" \
            -var="domain=${{ github.event.inputs.domain }}" \
            -var="region=ams3" \
            -var="size=s-1vcpu-1gb" \
            -var="ssh_key_fingerprint=${{ secrets.DO_SSH_KEY_FINGERPRINT }}" \
            -var="ssh_private_key_path=/tmp/ssh_key"

      - name: Get Server IP
        working-directory: terraform
        run: |
          SERVER_IP=$(terraform output -raw server_ip)
          echo "SERVER_IP=$SERVER_IP" >> $GITHUB_ENV
          echo "Server IP: $SERVER_IP"

      - name: Wait for SSH
        run: |
          echo "Waiting for SSH to be available..."
          for i in {1..30}; do
            if ssh -o StrictHostKeyChecking=no -o ConnectTimeout=5 -i /tmp/ssh_key root@${{ env.SERVER_IP }} "echo ready"; then
              echo "SSH is ready"
              break
            fi
            echo "Attempt $i/30 - waiting..."
            sleep 10
          done

      - name: Generate passwords
        run: |
          DB_PASSWORD=$(openssl rand -base64 24)
          DB_ROOT_PASSWORD=$(openssl rand -base64 24)
          ADMIN_PASSWORD=$(openssl rand -base64 24)
          echo "DB_PASSWORD=$DB_PASSWORD" >> $GITHUB_ENV
          echo "DB_ROOT_PASSWORD=$DB_ROOT_PASSWORD" >> $GITHUB_ENV
          echo "ADMIN_PASSWORD=$ADMIN_PASSWORD" >> $GITHUB_ENV

      - name: Setup SSH key for Ansible
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DO_SSH_PRIVATE_KEY }}" > ~/.ssh/admin
          chmod 600 ~/.ssh/admin
          echo "${{ secrets.ADMIN_SSH_PUB_KEY }}" > ~/.ssh/admin.pub
          echo "${{ secrets.DEVELOPER_SSH_PUB_KEY }}" > ~/.ssh/developer.pub

      - name: Run Ansible
        working-directory: ansible
        run: |
          ansible-playbook deploy.yaml \
            -i "${{ env.SERVER_IP }}, " \
            -e "domain=${{ github.event.inputs.domain }}" \
            -e "db_password=${{ env.DB_PASSWORD }}" \
            -e "db_root_password=${{ env.DB_ROOT_PASSWORD }}" \
            -e "admin_password=${{ env.ADMIN_PASSWORD }}" \
            --private-key ~/.ssh/admin

      - name: Configure Cloudflare DNS
        run: |
          python3 - << 'PYEOF'
          import requests
          import os

          api_token = "${{ secrets.CLOUDFLARE_API_TOKEN }}"
          domain = "${{ github.event.inputs.domain }}"
          server_ip = "${{ env.SERVER_IP }}"
          mail_server_ip = "${{ secrets.MAIL_SERVER_IP }}"

          headers = {
              "Authorization": f"Bearer {api_token}",
              "Content-Type": "application/json"
          }

          # Find the zone that matches the domain (supports subdomains)
          def find_zone(domain):
              # Try exact match first
              resp = requests.get(f"https://api.cloudflare.com/client/v4/zones?name={domain}", headers=headers).json()
              if resp.get("success") and resp["result"]:
                  return resp["result"][0]["id"], domain

              # Try parent domains (e.g., test.example.com -> example.com)
              parts = domain.split(".")
              for i in range(1, len(parts)):
                  parent = ".".join(parts[i:])
                  resp = requests.get(f"https://api.cloudflare.com/client/v4/zones?name={parent}", headers=headers).json()
                  if resp.get("success") and resp["result"]:
                      return resp["result"][0]["id"], parent
              return None, None

          zone_id, zone_name = find_zone(domain)
          if not zone_id:
              print(f"Zone not found for domain: {domain}")
              exit(1)

          print(f"Found zone: {zone_name} (ID: {zone_id})")

          # Determine record name relative to zone
          if domain == zone_name:
              record_name = "@"
              www_name = "www"
              mail_name = "mail"
          else:
              record_name = domain.replace(f".{zone_name}", "")
              www_name = f"www.{record_name}"
              mail_name = f"mail.{record_name}"

          records = [
              {"type": "A", "name": record_name, "content": server_ip, "ttl": 1, "proxied": True},
              {"type": "A", "name": www_name, "content": server_ip, "ttl": 1, "proxied": True},
              {"type": "A", "name": mail_name, "content": mail_server_ip, "ttl": 1, "proxied": False},
              {"type": "MX", "name": record_name, "content": f"mail.{domain}.", "priority": 100, "ttl": 1},
              {"type": "TXT", "name": record_name, "content": f"v=spf1 mx ip4:{mail_server_ip} ~all", "ttl": 1},
              {"type": "TXT", "name": f"_dmarc.{domain}", "content": "v=DMARC1;p=none", "ttl": 1},
          ]

          for record in records:
              resp = requests.post(
                  f"https://api.cloudflare.com/client/v4/zones/{zone_id}/dns_records",
                  headers=headers,
                  json=record
              )
              if resp.json().get("success"):
                  print(f"Created: {record['type']} {record['name']}")
              else:
                  print(f"Failed: {record['type']} {record['name']} - {resp.text}")

          # Enable Always Use HTTPS
          requests.patch(
              f"https://api.cloudflare.com/client/v4/zones/{zone_id}/settings/always_use_https",
              headers=headers,
              json={"value": "on"}
          )
          print("Always Use HTTPS enabled")
          PYEOF

      - name: Create mail domain on mail server
        if: github.event.inputs.enable_mail == 'true'
        id: mail
        run: |
          chmod +x scripts/create-mail-domain.sh
          OUTPUT=$(./scripts/create-mail-domain.sh \
            "${{ github.event.inputs.domain }}" \
            "${{ secrets.MAIL_SERVER_IP }}" \
            "~/.ssh/admin")
          
          echo "$OUTPUT" >> $GITHUB_OUTPUT
          
          while IFS='=' read -r key value; do
            echo "$key=$value" >> $GITHUB_ENV
          done <<< "$OUTPUT"

      - name: Add DKIM record to Cloudflare
        if: github.event.inputs.enable_mail == 'true' && env.MAIL_DKIM_KEY != ''
        run: |
          python3 - << 'PYEOF'
          import requests
          import os

          api_token = "${{ secrets.CLOUDFLARE_API_TOKEN }}"
          domain = "${{ github.event.inputs.domain }}"
          dkim_key = os.environ.get("MAIL_DKIM_KEY", "")

          headers = {
              "Authorization": f"Bearer {api_token}",
              "Content-Type": "application/json"
          }

          def find_zone(domain):
              resp = requests.get(f"https://api.cloudflare.com/client/v4/zones?name={domain}", headers=headers).json()
              if resp.get("success") and resp["result"]:
                  return resp["result"][0]["id"], domain
              parts = domain.split(".")
              for i in range(1, len(parts)):
                  parent = ".".join(parts[i:])
                  resp = requests.get(f"https://api.cloudflare.com/client/v4/zones?name={parent}", headers=headers).json()
                  if resp.get("success") and resp["result"]:
                      return resp["result"][0]["id"], parent
              return None, None

          zone_id, zone_name = find_zone(domain)
          if not zone_id:
              print(f"Zone not found for domain: {domain}")
              exit(1)

          dkim_value = f"v=DKIM1; k=rsa; t=s; s=email; p={dkim_key}"
          record = {
              "type": "TXT",
              "name": f"mail._domainkey.{domain}",
              "content": dkim_value,
              "ttl": 1
          }

          resp = requests.post(
              f"https://api.cloudflare.com/client/v4/zones/{zone_id}/dns_records",
              headers=headers,
              json=record
          )
          if resp.json().get("success"):
              print(f"DKIM record created for {domain}")
          else:
              print(f"Failed to create DKIM record: {resp.text}")
          PYEOF

      # TODO: Re-enable email notifications for production
      # - name: Send credentials via email
      #   if: github.event.inputs.enable_mail == 'true'
      #   run: |
      #     python3 scripts/send-credentials.py

      - name: Save credentials summary
        run: |
          echo "## Server Created: ${{ github.event.inputs.domain }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Server" >> $GITHUB_STEP_SUMMARY
          echo "| Setting | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Server IP | \`${{ env.SERVER_IP }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Domain | \`${{ github.event.inputs.domain }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| DB User | \`${{ replace(github.event.inputs.domain, '.', '_') }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| DB Password | \`${{ env.DB_PASSWORD }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| DB Root Password | \`${{ env.DB_ROOT_PASSWORD }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| phpMyAdmin | http://${{ env.SERVER_IP }}:8080 |" >> $GITHUB_STEP_SUMMARY
          if [ "${{ github.event.inputs.enable_mail }}" = "true" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Mail Accounts" >> $GITHUB_STEP_SUMMARY
            echo "| Email | Password |" >> $GITHUB_STEP_SUMMARY
            echo "|-------|----------|" >> $GITHUB_STEP_SUMMARY
            echo "| admin@${{ github.event.inputs.domain }} | \`${{ env.MAIL_ADMIN_PASSWORD }}\` |" >> $GITHUB_STEP_SUMMARY
            echo "| office@${{ github.event.inputs.domain }} | \`${{ env.MAIL_OFFICE_PASSWORD }}\` |" >> $GITHUB_STEP_SUMMARY
            echo "| support@${{ github.event.inputs.domain }} | \`${{ env.MAIL_SUPPORT_PASSWORD }}\` |" >> $GITHUB_STEP_SUMMARY
            echo "| info@${{ github.event.inputs.domain }} | \`${{ env.MAIL_INFO_PASSWORD }}\` |" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "⚠️ **Save these credentials securely!**" >> $GITHUB_STEP_SUMMARY
