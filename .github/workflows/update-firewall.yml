name: Update Firewall

run-name: ${{ vars.ALLOWED_IPS }}

on:
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Get Cloudflare IPs
        id: cf_ips
        run: |
          CF_IPS=$(curl -s https://api.cloudflare.com/client/v4/ips | jq -c '.result.ipv4_cidrs')
          echo "cf_ips=$CF_IPS" >> $GITHUB_OUTPUT

      - name: Update Firewall via DO API
        run: |
          ALLOWED_IPS='${{ vars.ALLOWED_IPS }}'
          CF_IPS='${{ steps.cf_ips.outputs.cf_ips }}'
          
          FIREWALL_ID=$(curl -s -X GET \
            -H "Authorization: Bearer ${{ secrets.DO_TOKEN }}" \
            "https://api.digitalocean.com/v2/firewalls" | \
            jq -r '.firewalls[] | select(.name == "web-servers-firewall") | .id')
          
          if [ -z "$FIREWALL_ID" ]; then
            echo "Creating firewall..."
            curl -s -X POST \
              -H "Authorization: Bearer ${{ secrets.DO_TOKEN }}" \
              -H "Content-Type: application/json" \
              -d "{
                \"name\": \"web-servers-firewall\",
                \"inbound_rules\": [
                  {\"protocol\": \"tcp\", \"ports\": \"80\", \"sources\": {\"addresses\": $CF_IPS}},
                  {\"protocol\": \"tcp\", \"ports\": \"443\", \"sources\": {\"addresses\": $CF_IPS}},
                  {\"protocol\": \"tcp\", \"ports\": \"22\", \"sources\": {\"addresses\": $ALLOWED_IPS}},
                  {\"protocol\": \"tcp\", \"ports\": \"8080\", \"sources\": {\"addresses\": $ALLOWED_IPS}}
                ],
                \"outbound_rules\": [
                  {\"protocol\": \"tcp\", \"ports\": \"1-65535\", \"destinations\": {\"addresses\": [\"0.0.0.0/0\", \"::/0\"]}},
                  {\"protocol\": \"udp\", \"ports\": \"1-65535\", \"destinations\": {\"addresses\": [\"0.0.0.0/0\", \"::/0\"]}},
                  {\"protocol\": \"icmp\", \"destinations\": {\"addresses\": [\"0.0.0.0/0\", \"::/0\"]}}
                ],
                \"tags\": [\"web-server\"]
              }"
          else
            echo "Updating firewall $FIREWALL_ID..."
            curl -s -X PUT \
              -H "Authorization: Bearer ${{ secrets.DO_TOKEN }}" \
              -H "Content-Type: application/json" \
              "https://api.digitalocean.com/v2/firewalls/$FIREWALL_ID" \
              -d "{
                \"inbound_rules\": [
                  {\"protocol\": \"tcp\", \"ports\": \"80\", \"sources\": {\"addresses\": $CF_IPS}},
                  {\"protocol\": \"tcp\", \"ports\": \"443\", \"sources\": {\"addresses\": $CF_IPS}},
                  {\"protocol\": \"tcp\", \"ports\": \"22\", \"sources\": {\"addresses\": $ALLOWED_IPS}},
                  {\"protocol\": \"tcp\", \"ports\": \"8080\", \"sources\": {\"addresses\": $ALLOWED_IPS}}
                ],
                \"outbound_rules\": [
                  {\"protocol\": \"tcp\", \"ports\": \"1-65535\", \"destinations\": {\"addresses\": [\"0.0.0.0/0\", \"::/0\"]}},
                  {\"protocol\": \"udp\", \"ports\": \"1-65535\", \"destinations\": {\"addresses\": [\"0.0.0.0/0\", \"::/0\"]}},
                  {\"protocol\": \"icmp\", \"destinations\": {\"addresses\": [\"0.0.0.0/0\", \"::/0\"]}}
                ],
                \"tags\": [\"web-server\"]
              }"
          fi

      - name: Summary
        run: |
          echo "## Firewall Updated" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Allowed IPs:" >> $GITHUB_STEP_SUMMARY
          echo "\`${{ vars.ALLOWED_IPS }}\`" >> $GITHUB_STEP_SUMMARY
