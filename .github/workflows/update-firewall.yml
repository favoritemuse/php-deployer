name: Update Firewall

run-name: ${{ vars.ALLOWED_IPS }}

on:
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform Init
        working-directory: terraform
        run: terraform init -lock=false

      - name: Terraform Apply
        working-directory: terraform
        env:
          TF_VAR_do_token: ${{ secrets.DO_TOKEN }}
          TF_VAR_cloudflare_ips: '["173.245.48.0/20","103.21.244.0/22","103.22.200.0/22","103.31.4.0/22","141.101.64.0/18","108.162.192.0/18","190.93.240.0/20","188.114.96.0/20","197.234.240.0/22","198.41.128.0/17","162.158.0.0/15","104.16.0.0/13","104.24.0.0/14","172.64.0.0/13","131.0.72.0/22"]'
          TF_VAR_allowed_ips: ${{ vars.ALLOWED_IPS }}
        run: |
          terraform apply -auto-approve -lock=false \
            -var="do_token=${{ secrets.DO_TOKEN }}" \
            -target=digitalocean_firewall.web

      - name: Summary
        run: |
          echo "## Firewall Updated" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Allowed IPs:" >> $GITHUB_STEP_SUMMARY
          echo "\`${{ vars.ALLOWED_IPS }}\`" >> $GITHUB_STEP_SUMMARY
